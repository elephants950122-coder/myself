<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實戰作品 | 林建宇</title>
    <style>
        /* 樣式保持一致性 */
        :root { --bg-dark: #0f111a; --bg-gradient: radial-gradient(circle at top right, #1e2235 0%, #0f111a 100%); --surface: rgba(255, 255, 255, 0.04); --primary: #38bdf8; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-border: rgba(255, 255, 255, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); line-height: 1.6; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: rgba(15,17,26,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--accent-border); display: flex; align-items: center; padding: 0 50px; z-index: 1000; }
        .current-page { font-size: 0.85rem; color: var(--primary); font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }

        .menu-toggle { position: fixed; top: 15px; right: 50px; z-index: 2001; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 10px 24px; border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); transition: 0.3s; color: var(--text-main); }
        .menu-toggle:hover { border-color: var(--primary); background: rgba(56, 189, 248, 0.15); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .overlay-nav { display: flex; flex-direction: column; gap: 40px; text-align: center; }
        .overlay-nav a { color: var(--text-muted); text-decoration: none; font-size: 2.5rem; font-weight: bold; transition: 0.4s; }
        .overlay-nav a:hover { color: var(--primary); transform: scale(1.1); }

        .container { max-width: 900px; margin: 160px auto; padding: 0 5%; }
        h2 { font-size: 3.5rem; font-weight: 900; text-align: center; margin-bottom: 60px; }
        .card { background: var(--surface); padding: 40px; border-radius: 32px; border: 1px solid var(--accent-border); margin-bottom: 40px; }
    </style>
</head>
<body>
    <header><div class="current-page">WORKS / 實戰作品</div></header>
    <div class="menu-toggle" onclick="toggleMenu()">MENU ☰</div>
    <div id="navOverlay" class="overlay">
        <div style="position: absolute; top: 30px; right: 50px; cursor: pointer; font-size: 1.5rem; color: #fff;" onclick="toggleMenu()">✕</div>
        <nav class="overlay-nav">
            <a href="/">個人簡介</a>
            <a href="/test">職涯測驗結果</a>
            <a href="/job">職務研究</a>
            <a href="/resume">實戰作品</a>
        </nav>
    </div>

    <div class="container">
        <h2>代表專案</h2>
        <div class="card">
            <h3 style="color: var(--primary);">瑪利亞烘焙預訂 APP</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">2025.12 | 系統開發專案</p>
            <p>使用 MVVM 架構與 Firebase 雲端資料庫，開發具備購物車與訂單管理功能的移動端應用程式。</p>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('navOverlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>
</body>
</html>
