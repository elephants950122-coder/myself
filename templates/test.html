<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特質分析 | 林建宇</title>
    <style>
        :root { --bg-dark: #12141d; --bg-gradient: linear-gradient(135deg, #1e2235 0%, #12141d 100%); --surface: rgba(255, 255, 255, 0.05); --primary: #38bdf8; --text-main: #f1f5f9; --text-muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); line-height: 1.8; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; padding: 0 50px; z-index: 1000; }
        .current-page { font-size: 0.9rem; color: var(--primary); font-weight: bold; letter-spacing: 2px; }
        .menu-toggle { position: fixed; top: 15px; right: 50px; z-index: 2001; cursor: pointer; padding: 10px 24px; border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); color: var(--text-main); transition: 0.3s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .overlay-nav { display: flex; flex-direction: column; gap: 35px; text-align: center; }
        .overlay-nav a { color: var(--text-muted); text-decoration: none; font-size: 2.5rem; font-weight: bold; transition: 0.4s; }
        .overlay-nav a:hover { color: var(--primary); }
        .container { max-width: 900px; margin: 150px auto; padding: 0 5%; }
        .card { background: var(--surface); padding: 45px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(5px); }
        h2 { font-size: 3.5rem; margin-bottom: 45px; }
        h3 { color: var(--primary); margin-bottom: 20px; }
        .visual-box { width: 100%; height: 400px; border-radius: 20px; margin-top: 20px; background: url('/static/ucan_chart.jpg') center/contain no-repeat; background-color: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <header><div class="current-page">特質分析 / ANALYSIS</div></header>
    <div class="menu-toggle" onclick="toggleMenu()">選單 ☰</div>
    <div id="navOverlay" class="overlay">
        <div style="position: absolute; top: 40px; right: 50px; cursor: pointer;" onclick="toggleMenu()">關閉 ✕</div>
        <nav class="overlay-nav"><a href="/">個人簡介</a><a href="/test">特質分析</a><a href="/job">職務研究</a><a href="/resume">實戰作品</a></nav>
    </div>
    <div class="container">
        <h2>UCAN 特質分析</h2>
        <div class="card">
            <h3>測驗結果：CRS 型</h3>
            <p>具備嚴謹邏輯（C）、動手實作（R）與團隊溝通（S）能力。</p>
        </div>
        <div class="visual-box"></div>
    </div>
    <script>function toggleMenu() { const o = document.getElementById('navOverlay'); o.style.display = (o.style.display==='flex')?'none':'flex'; }</script>
</body>
</html>
